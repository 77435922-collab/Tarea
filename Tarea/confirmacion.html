<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Compra - Sakura</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Mantén los estilos que ya tienes -->
</head>
<body>

    <header>
        <div>
            <div class="logo">Sakura</div>
            <div class="tagline">Elegancia y frescura en cada detalle</div>
        </div>
        <button class="login-btn" onclick="window.location.href='index.html'">Volver</button>
    </header>

    <div class="confirmacion-container">
        <h1>Confirmación de Compra 🌸</h1>

        <div id="resumen-producto"></div>

        <form id="form-confirmacion">
            <div class="input-group">
                <input type="text" id="nombre" placeholder="Nombre completo" required>
            </div>
            <div class="input-group">
                <input type="email" id="email" placeholder="Correo electrónico" required>
            </div>
            <div class="input-group">
                <input type="tel" id="telefono" placeholder="Teléfono/WhatsApp" required>
            </div>
            <div class="input-group">
                <input type="number" id="cantidad" placeholder="Cantidad" min="1" value="1">
            </div>

            <button type="submit" class="btn-confirmar">Confirmar Compra</button>
        </form>
    </div>

    <script>
        const datosCompra = JSON.parse(localStorage.getItem('productoCompra'));

        if (datosCompra) {
            document.getElementById('resumen-producto').innerHTML = `
                <h3>Producto: ${datosCompra.nombre}</h3>
                <p>Precio unitario: S/ ${datosCompra.precio}.00</p>
            `;
        }

        // Bucle WHILE + DO...WHILE en validación
        document.getElementById('form-confirmacion').addEventListener('submit', function(e) {
            e.preventDefault();

            let nombre = document.getElementById('nombre').value.trim();
            let cantidad = parseInt(document.getElementById('cantidad').value);

            // While: Validar que el nombre no esté vacío
            while (nombre === "") {
                nombre = prompt("Por favor ingresa tu nombre completo:");
                if (nombre) document.getElementById('nombre').value = nombre;
            }

            // Do...While: Asegurar que la cantidad sea válida
            do {
                if (cantidad < 1 || isNaN(cantidad)) {
                    cantidad = parseInt(prompt("La cantidad debe ser al menos 1. Ingresa la cantidad:"));
                }
            } while (cantidad < 1 || isNaN(cantidad));

            alert(`✅ Compra confirmada!\n\nCliente: ${nombre}\nProducto: ${datosCompra.nombre}\nCantidad: ${cantidad}\nTotal: S/ ${(datosCompra.precio * cantidad).toFixed(2)}`);

            localStorage.removeItem('productoCompra');
            setTimeout(() => window.location.href = "index.html", 1500);
        });
    </script>
</body>
</html>
