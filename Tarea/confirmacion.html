<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Compra - Sakura</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .confirmacion-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(255,77,109,0.15);
            text-align: center;
        }
        .btn-confirmar {
            background: linear-gradient(90deg, #ff4d6d, #ff8a9e);
            color: white;
            border: none;
            padding: 16px 50px;
            font-size: 1.3rem;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <div class="logo">Sakura</div>
            <div class="tagline">Elegancia y frescura en cada detalle</div>
        </div>
        <button class="login-btn" onclick="window.location.href='index.html'">Volver al Catálogo</button>
    </header>

    <div class="confirmacion-container">
        <h1>Confirmación de Compra 🌸</h1>
        <div id="resumen-producto"></div>

        <form id="form-confirmacion">
            <div class="input-group">
                <input type="text" id="nombre" placeholder="Nombre completo" required>
            </div>
            <div class="input-group">
                <input type="email" id="email" placeholder="Correo electrónico" required>
            </div>
            <div class="input-group">
                <input type="tel" id="telefono" placeholder="Teléfono / WhatsApp" required>
            </div>
            <div class="input-group">
                <input type="number" id="cantidad" placeholder="Cantidad" min="1" value="1" required>
            </div>

            <button type="submit" class="btn-confirmar">Confirmar y Pagar</button>
        </form>
    </div>

    <script>
        const datosCompra = JSON.parse(localStorage.getItem('productoCompra'));

        if (datosCompra) {
            document.getElementById('resumen-producto').innerHTML = `
                <h3>Producto: ${datosCompra.nombre}</h3>
                <p>Precio unitario: S/ ${datosCompra.precio}.00</p>
            `;
        }

        document.getElementById('form-confirmacion').addEventListener('submit', function(e) {
            e.preventDefault();

            let nombre = document.getElementById('nombre').value.trim();
            let cantidad = parseInt(document.getElementById('cantidad').value);
           //bucle while y do while
            while (nombre === "") {
                nombre = prompt("⚠️ Por favor ingresa tu nombre completo:");
                if (nombre) document.getElementById('nombre').value = nombre;
            }

            do {
                if (cantidad < 1 || isNaN(cantidad)) {
                    cantidad = parseInt(prompt("⚠️ La cantidad debe ser al menos 1.\nIngresa la cantidad:"));
                }
            } while (cantidad < 1 || isNaN(cantidad));

            // Confirmación final
            alert(`🎉 ¡Compra confirmada exitosamente!\n\nCliente: ${nombre}\nProducto: ${datosCompra.nombre}\nCantidad: ${cantidad}\nTotal: S/ ${(datosCompra.precio * cantidad).toFixed(2)}\n\nTe contactaremos por WhatsApp.`);

            localStorage.removeItem('productoCompra');
            setTimeout(() => window.location.href = "index.html", 1800);
        });
    </script>
</body>
</html>
